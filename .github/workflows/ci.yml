name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv venv .venv --python 3.12 && uv pip install --python .venv/bin/python -e ".[dev]"
      - name: Ruff check
        run: .venv/bin/ruff check .
      - name: Ruff format check
        run: .venv/bin/ruff format --check .
      - name: Mypy strict
        run: .venv/bin/mypy --strict src/doc_extractor
      - name: Pytest with coverage
        run: .venv/bin/pytest --cov --cov-fail-under=85 tests/
      # Story 2.7 / AR3 — canonical-4 regression gate. ``--mocked`` is the
      # CI-safe mode: tautological extractor validates the script's wiring
      # without spending API budget on every commit. Yang's nightly real-
      # provider run is wired separately once Story 2.1 ships fixtures.
      - name: Verify canonical
        run: .venv/bin/python scripts/verify_canonical.py --mocked
      - name: Cost-ceiling check
        run: .venv/bin/python scripts/check_cost_ceiling.py
