# Per-agent provider/model defaults.
# Resolution chain (config/precedence.py): CLI > env > this YAML > hardcoded fallback.
# Env override pattern: DOC_EXTRACTOR_PROVIDER_<AGENT_NAME>, DOC_EXTRACTOR_MODEL_<AGENT_NAME>
# (AGENT_NAME is upper-snake, e.g. PASSPORT, DRIVER_LICENCE).

passport:
  provider: anthropic
  model: claude-sonnet-4-6-20260101

# Cheapest configured provider (Haiku) — classifier is the high-volume entrypoint
# and only needs coarse routing, so it runs on the smaller model.
classifier:
  provider: anthropic
  model: claude-haiku-4-5-20251001

# Receipt extraction is direction-sensitive (Chinese-label-trust rule, debit/credit
# semantics). Run on Sonnet — Haiku regressed on inverted-label CN receipts during
# the lel-audit-2026 migration.
payment_receipt:
  provider: anthropic
  model: claude-sonnet-4-6-20260101

# Driver licences are ID-document-class — same Sonnet default as Passport. The
# day-first vs ISO date conversion and CJK address fields benefit from the
# stronger model.
driver_licence:
  provider: anthropic
  model: claude-sonnet-4-6-20260101

# National ID cards — Sonnet because the CN 居民身份证 carries embedded DOB
# (positions 7-14) and gender (position 17) that the model cross-checks against
# the printed face, and HK/SG/TW formats need precise mask-preservation.
national_id:
  provider: anthropic
  model: claude-sonnet-4-6-20260101

# Visas — Sonnet because the four supported formats (NZ Immigration, CN CVASC,
# US B1/B2, Schengen) each have format-internal class codes (L/F/M/Z, B1/B2,
# C/D, etc.) plus ISO 3166-1 alpha-2 country normalisation that benefits from
# the stronger model.
visa:
  provider: anthropic
  model: claude-sonnet-4-6-20260101

# VerifierAgent — Sonnet (NOT Haiku). The verifier's job is to catch errors
# the specialist made, so cheap-model verification is self-defeating; the
# verifier needs at least the same reasoning capacity as the specialist it's
# auditing. Used on PaymentReceipt today (Story 3.7); expands to the four ID
# types in Story 4.4.
verifier:
  provider: anthropic
  model: claude-sonnet-4-6-20260101

# Epic 5 compliance documents — Sonnet across the board. Box-tick discipline
# (PEP), outcome normalisation (verification reports), and handwritten-field
# OCR (application forms) all benefit from the stronger model.
pep_declaration:
  provider: anthropic
  model: claude-sonnet-4-6-20260101

verification_report:
  provider: anthropic
  model: claude-sonnet-4-6-20260101

application_form:
  provider: anthropic
  model: claude-sonnet-4-6-20260101

# Epic 5 bank documents — Sonnet for the multi-page header-search discipline
# (CN bank statements sometimes put the header on page 2/3) and verbatim
# account-number mask preservation.
bank_statement:
  provider: anthropic
  model: claude-sonnet-4-6-20260101

bank_account_confirmation:
  provider: anthropic
  model: claude-sonnet-4-6-20260101

# Epic 5 entity documents — Sonnet for the list+nested-object discipline
# (CompanyExtract director/shareholder list ordering preservation,
# EntityOwnership nested UBO list with verbatim ownership_percentage).
company_extract:
  provider: anthropic
  model: claude-sonnet-4-6-20260101

entity_ownership:
  provider: anthropic
  model: claude-sonnet-4-6-20260101
