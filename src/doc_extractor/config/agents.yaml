# Per-agent provider/model defaults.
# Resolution chain (config/precedence.py): CLI > env > this YAML > hardcoded fallback.
# Env override pattern: DOC_EXTRACTOR_PROVIDER_<AGENT_NAME>, DOC_EXTRACTOR_MODEL_<AGENT_NAME>
# (AGENT_NAME is upper-snake, e.g. PASSPORT, DRIVER_LICENCE).

passport:
  provider: anthropic
  model: claude-sonnet-4-6-20260101

# Cheapest configured provider (Haiku) — classifier is the high-volume entrypoint
# and only needs coarse routing, so it runs on the smaller model.
classifier:
  provider: anthropic
  model: claude-haiku-4-5-20251001

# Receipt extraction is direction-sensitive (Chinese-label-trust rule, debit/credit
# semantics). Run on Sonnet — Haiku regressed on inverted-label CN receipts during
# the lel-audit-2026 migration.
payment_receipt:
  provider: anthropic
  model: claude-sonnet-4-6-20260101
